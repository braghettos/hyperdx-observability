{{- if .Values.defaultAlerts.enabled }}
{{- if .Values.defaultAlerts.errorLogVolume.enabled }}
apiVersion: observability.krateo.io/v1alpha1
kind: Alert
metadata:
  name: error-log-volume
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
spec:
  displayName: "Error log volume"
  where: "SeverityText:error OR SeverityText:Error OR SeverityText:ERROR"
  interval: {{ .Values.defaultAlerts.errorLogVolume.interval | quote }}
  threshold: {{ .Values.defaultAlerts.errorLogVolume.threshold }}
  thresholdType: above
  message: "Error-log volume is elevated on the Krateo platform — Autopilot will auto-triage the root cause."
{{- end }}
{{- if .Values.defaultAlerts.warningLogVolume.enabled }}
---
apiVersion: observability.krateo.io/v1alpha1
kind: Alert
metadata:
  name: warning-log-volume
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
spec:
  displayName: "Warning log volume"
  where: "SeverityText:warn OR SeverityText:warning OR SeverityText:WARN"
  interval: {{ .Values.defaultAlerts.warningLogVolume.interval | quote }}
  threshold: {{ .Values.defaultAlerts.warningLogVolume.threshold }}
  thresholdType: above
  message: "Warning-log volume crossed the threshold — Autopilot will summarise likely causes."
{{- end }}
{{- end }}
