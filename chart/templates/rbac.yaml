apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "hobs.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "hobs.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
rules:
  # the handler creates/updates TroubleshootingReport CRs (+ status) on alert fire
  - apiGroups: ["observability.krateo.io"]
    resources: ["troubleshootingreports", "troubleshootingreports/status"]
    verbs: ["create", "get", "list", "patch", "update"]
  # the reconciler reads Alert CRs (desired), seeds defaults, and writes their status
  - apiGroups: ["observability.krateo.io"]
    resources: ["alerts", "alerts/status"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "hobs.name" . }}
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "hobs.name" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hobs.name" . }}
    namespace: {{ .Release.Namespace }}
