{{- /*
Create the HyperDX admin-creds Secret only if it doesn't already exist, so the auto-generated
password stays stable across `helm upgrade` (and isn't clobbered). resource-policy: keep means an
uninstall won't delete it (the HyperDX team keeps that password). Requires the render environment
to support `lookup` (Krateo's composition controller renders server-side with cluster access);
under a plain `helm template` with no cluster, set .Values.hyperdx.adminPassword explicitly.
*/ -}}
{{- if not (lookup "v1" "Secret" .Release.Namespace "hyperdx-admin-creds") }}
apiVersion: v1
kind: Secret
metadata:
  name: hyperdx-admin-creds
  namespace: {{ .Release.Namespace }}
  labels: {{- include "hobs.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  email: {{ .Values.hyperdx.adminEmail | quote }}
  password: {{ include "hobs.adminPassword" . | quote }}
{{- end }}
